name: Auto-update Claude model

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch blessed model
        id: fetch
        run: |
          RESPONSE=$(curl -sf https://n8n.maikranz-business.com/claude-model)
          NEW_MODEL=$(echo "$RESPONSE" | jq -r '.model')
          echo "new_model=$NEW_MODEL" >> $GITHUB_OUTPUT

      - name: Check current model
        id: current
        run: |
          CURRENT=$(grep '// CLAUDE_MODEL' api/generate-reel.js | grep -oP "(?<=model: ')[^']+")
          echo "current_model=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update if outdated
        id: update
        if: steps.current.outputs.current_model != steps.fetch.outputs.new_model
        run: |
          NEW="${{ steps.fetch.outputs.new_model }}"
          sed -i "s|model: '.*', // CLAUDE_MODEL|model: '$NEW', // CLAUDE_MODEL|" api/generate-reel.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/generate-reel.js
          git commit -m "chore: auto-update Claude model to $NEW"
          git push
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: Send report mail
        run: |
          UPDATED="${{ steps.update.outputs.updated }}"
          CURRENT="${{ steps.current.outputs.current_model }}"
          NEW="${{ steps.fetch.outputs.new_model }}"
          curl -sf -X POST https://n8n.maikranz-business.com/webhook/claude-model-report \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"wedding-reel-ai\",\"updated\":${UPDATED:-false},\"current_model\":\"$CURRENT\",\"new_model\":\"$NEW\"}" || true
